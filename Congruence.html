<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Congruence Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(135deg, #f0f9ff 0%, #e0e7ff 100%);
            min-height: 100vh; 
            overflow-y: auto; 
        }

        h1, h2, h3, .fun-font { font-family: 'Fredoka', sans-serif; }
        
        canvas {
            background: #ffffff;
            border-radius: 1.5rem;
            box-shadow: inset 0 2px 6px rgba(0, 0, 0, 0.05);
            border: 2px solid #e0e7ff;
            width: 100%;
            height: auto;
            max-height: 450px; /* Increased height for bigger triangles */
            object-fit: contain;
            margin: 0 auto;
        }

        .fade-in { animation: fadeIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .symbol-btn {
            @apply px-5 py-3 bg-white hover:bg-indigo-50 border-2 border-slate-200 rounded-xl text-xl font-bold text-slate-700 transition transform active:scale-95 shadow-sm;
        }

        .option-btn {
            transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid #e2e8f0;
        }
        .option-btn:hover { border-color: #6366f1; background-color: #f5f3ff; transform: translateY(-2px); }
        .option-btn.selected { background-color: #4f46e5; color: white; border-color: #4338ca; box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3); }
        
        .correct-flash { animation: flashGreen 0.5s; }
        @keyframes flashGreen { 0% { background: #dcfce7; } 100% { background: transparent; } }
        
        .error-flash { animation: flashRed 0.5s; }
        @keyframes flashRed { 0% { background: #fee2e2; } 100% { background: transparent; } }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 5px; }
    </style>
</head>
<body class="flex flex-col items-center p-6 text-slate-800" id="mainBody">

<!-- Back to Dashboard button -->
<button onclick="window.location.href='index.html'" 
        title="Back to Dashboard"
        style="position:fixed;left:14px;top:14px;z-index:9999;padding:8px 12px;border-radius:10px;background:#ffffff;border:1px solid rgba(0,0,0,0.06);box-shadow:0 6px 18px rgba(0,0,0,0.06);font-weight:700;cursor:pointer">← Dashboard</button>

    <!-- MENU SCREEN -->
    <div id="screen-menu" class="w-full max-w-xl bg-white/80 backdrop-blur-xl p-10 rounded-[2rem] shadow-2xl border border-white fade-in relative overflow-hidden ring-4 ring-white/50">
        <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-blue-500 to-indigo-500"></div>
        
        <div class="space-y-5 mt-4">
            <button onclick="app.startTopic('naming')" class="w-full p-6 bg-white border-2 border-slate-100 hover:border-blue-400 rounded-2xl shadow-sm hover:shadow-lg transition text-left flex items-center justify-between group transform hover:-translate-y-1">
                <div>
                    <h3 class="font-bold text-2xl text-slate-700 group-hover:text-blue-600">1. Naming Congruence</h3>
                    <p class="text-sm text-slate-400 font-medium mt-1">Write the full congruence statement.</p>
                </div>
                <span class="text-4xl bg-blue-50 w-16 h-16 flex items-center justify-center rounded-full group-hover:scale-110 transition">✍️</span>
            </button>
            
            <button onclick="app.startTopic('finding')" class="w-full p-6 bg-white border-2 border-slate-100 hover:border-indigo-400 rounded-2xl shadow-sm hover:shadow-lg transition text-left flex items-center justify-between group transform hover:-translate-y-1">
                <div>
                    <h3 class="font-bold text-2xl text-slate-700 group-hover:text-indigo-600">2. Finding Unknowns</h3>
                    <p class="text-sm text-slate-400 font-medium mt-1">Solve for x/y with correct reasons.</p>
                </div>
                <span class="text-4xl bg-indigo-50 w-16 h-16 flex items-center justify-center rounded-full group-hover:scale-110 transition">📐</span>
            </button>
            
            <button onclick="app.startTopic('proving')" class="w-full p-6 bg-white border-2 border-slate-100 hover:border-purple-400 rounded-2xl shadow-sm hover:shadow-lg transition text-left flex items-center justify-between group transform hover:-translate-y-1">
                <div>
                    <h3 class="font-bold text-2xl text-slate-700 group-hover:text-purple-600">3. Proving Triangles</h3>
                    <p class="text-sm text-slate-400 font-medium mt-1">Construct geometric proofs step-by-step.</p>
                </div>
                <span class="text-4xl bg-purple-50 w-16 h-16 flex items-center justify-center rounded-full group-hover:scale-110 transition">🛡️</span>

    <!-- QUIZ CONTAINER -->

        <!-- Navigation -->
        <div class="flex justify-between items-center bg-white px-6 py-4 rounded-2xl shadow-sm border border-slate-200">
            <button onclick="app.requestExit()" class="text-sm font-black text-slate-400 hover:text-red-500 uppercase tracking-widest transition flex items-center gap-2">

            <div id="topicTitle" class="text-lg font-black text-indigo-600 uppercase tracking-wider bg-indigo-50 px-4 py-1.5 rounded-full">Topic</div>
            <div id="scoreDisplay" class="text-lg font-mono font-bold text-slate-600 bg-slate-100 px-4 py-1.5 rounded-full">0 / 0</div>
        </div>

        <div class="flex flex-col lg:flex-row gap-8 items-start">
            <!-- Left: Visual -->
            <div class="w-full lg:w-5/12 sticky top-4">
                <div class="bg-white p-6 rounded-[2rem] shadow-lg border border-slate-100">
                    <canvas id="geoCanvas" width="700" height="400"></canvas>
                    <p class="text-center mt-4 text-xs uppercase font-bold text-slate-300 tracking-widest">Not drawn to scale</p>
                </div>
            </div>

            <!-- Right: Interactive Area -->
            <div class="w-full lg:w-7/12">
                <div id="interactionArea" class="bg-white p-8 rounded-[2rem] shadow-lg border border-slate-100 h-full flex flex-col min-h-[350px]">
                    <!-- Dynamic Content Injected Here -->

    <!-- RESULTS SCREEN -->
    <div id="screen-results" class="hidden w-full max-w-lg bg-white p-10 rounded-[2.5rem] shadow-2xl border border-white fade-in text-center relative overflow-hidden ring-4 ring-white/50 mt-10">
        <div class="absolute top-0 left-0 w-full h-3 bg-gradient-to-r from-green-400 via-blue-500 to-purple-600"></div>
        
        <h2 class="text-4xl font-extrabold text-slate-800 mb-8 mt-2 fun-font">Quiz Complete!</h2>
        
        <div class="bg-slate-50 p-6 rounded-2xl mb-8 text-left border border-slate-100 shadow-inner">
            <div class="flex justify-between items-end mb-2 border-b border-slate-200 pb-2">
                <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Topic</p>
                <p class="text-lg font-bold text-slate-800" id="resTopic"></p>
            </div>
            <div class="flex justify-between items-end">
                <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Score</p>
                <div class="text-3xl font-mono font-bold text-indigo-600">
                    <span id="resScore">0</span><span class="text-xl text-slate-400">/</span><span id="resTotal">10</span>
                </div>
            </div>
        </div>

        <button onclick="app.finishExit()" class="w-full py-5 bg-slate-900 text-white font-bold text-xl rounded-2xl shadow-xl hover:bg-black transition transform hover:scale-[1.02]">Return to Menu</button>
    </div>

    <!-- Feedback Overlay -->
    <div id="feedbackModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-md hidden flex items-center justify-center z-50 p-4">
        <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl max-w-md w-full text-center animate-[fadeIn_0.3s_ease-out] border-4 border-white">
            <div id="feedbackIcon" class="text-7xl mb-6 transform hover:scale-110 transition"></div>
            <h3 id="feedbackTitle" class="text-3xl font-black mb-3 text-slate-800 tracking-tight"></h3>
            <p id="feedbackText" class="text-slate-500 text-lg mb-10 font-medium leading-relaxed"></p>
            <button onclick="app.nextQuestion()" class="w-full py-5 bg-indigo-600 hover:bg-indigo-700 text-white text-xl font-bold rounded-2xl transition shadow-lg shadow-indigo-200 transform active:scale-95">Next Question →</button>
        </div>
    </div>

    <!-- Exit Confirmation Modal -->
    <div id="exitModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden flex items-center justify-center z-50 p-4">
        <div class="bg-white p-8 rounded-3xl shadow-2xl max-w-sm w-full text-center animate-[fadeIn_0.2s_ease-out]">
            <h3 class="text-xl font-bold text-slate-800 mb-2">Leave Quiz?</h3>
            <p class="text-base text-slate-500 mb-8">Your current progress will be lost.</p>
            <div class="flex gap-4 justify-center">
                <button onclick="app.closeExitModal()" class="px-6 py-3 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-xl font-bold transition text-lg">Cancel</button>
                <button onclick="app.confirmExit()" class="px-6 py-3 bg-red-500 hover:bg-red-600 text-white rounded-xl font-bold transition text-lg">Exit</button>
            </div>
        </div>
    </div>

<script>
const app = (() => {

// Provide a safe global increment fallback if the dashboard isn't open
if (!window.__mq_increment || typeof window.__mq_increment !== 'function') {
    window.__mq_increment = function(topic, amount = 1) {
        try { const key = 'mq_score_' + topic; const curr = parseInt(localStorage.getItem(key) || '0', 10); localStorage.setItem(key, String(curr + (amount || 1))); } catch (e) {}
    };
}

    const state = {
        topic: null,
        qCount: 0,
        score: 0,
        currentQ: null,
        totalQ: 10,
        lastFocusedInput: null
    };

    const els = {
        menu: document.getElementById('screen-menu'),
        quiz: document.getElementById('screen-quiz'),
        results: document.getElementById('screen-results'),
        canvas: document.getElementById('geoCanvas'),
        ctx: document.getElementById('geoCanvas').getContext('2d'),
        interaction: document.getElementById('interactionArea'),
        topicTitle: document.getElementById('topicTitle'),
        score: document.getElementById('scoreDisplay'),
        feedback: document.getElementById('feedbackModal'),
        exitModal: document.getElementById('exitModal'),
        body: document.getElementById('mainBody')
    };

    // --- MATH & DRAWING UTILS ---
    const randInt = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
    
    function rotatePoint(p, angle, center = {x:0, y:0}) {
        const s = Math.sin(angle);
        const c = Math.cos(angle);
        const px = p.x - center.x;
        const py = p.y - center.y;
        return {
            x: px * c - py * s + center.x,
            y: px * s + py * c + center.y
        };
    }

    // --- TRIANGLE SHAPE GENERATOR ---
    function getTrianglePoints(r) {
        // Enforce minimum size logic to avoid clustering
        const isObtuse = Math.random() > 0.6; // 40% chance of obtuse
        
        let angles = [];
        if (isObtuse) {
            // Pick 3 angles on the circle within a 180 deg sector
            const start = Math.random() * Math.PI * 2;
            const span = Math.PI * 0.8; // < 180 deg span ensures obtuse
            // Ensure minimum separation of 0.6 rad (~35 deg) within the span
            const minSep = 0.6;
            const remainingSpan = span - 2*minSep;
            const p1 = Math.random() * remainingSpan;
            
            angles = [start, start + minSep + p1, start + span];
        } else {
            // Acute: Spread roughly evenly (120 deg apart)
            const start = Math.random() * Math.PI * 2;
            // Minimum separation ~60 degrees (1.0 rad) to avoid small angles
            const gap1 = 1.0 + Math.random() * 1.5; 
            const gap2 = 1.0 + Math.random() * 1.5;
            // Ensure sum < 2PI and third gap is also reasonable
            if (gap1 + gap2 > 5.2) { gap1=2.1; gap2=2.1; } // Fallback
            
            angles = [start, start + gap1, start + gap1 + gap2];
        }
        
        return angles.map(a => ({x: r*Math.cos(a), y: r*Math.sin(a)}));
    }

    function drawTriangle(ctx, p1, p2, p3, labels, marks=[]) {
        // Draw Shape
        ctx.beginPath();
        ctx.moveTo(p1.x, p1.y);
        ctx.lineTo(p2.x, p2.y);
        ctx.lineTo(p3.x, p3.y);
        ctx.closePath();
        ctx.lineWidth = 3; // Thicker lines
        ctx.lineJoin = 'round';
        ctx.strokeStyle = '#334155';
        ctx.stroke();

        // Calculate Centroid
        const center = { x: (p1.x+p2.x+p3.x)/3, y: (p1.y+p2.y+p3.y)/3 };
        
        // Labels (Vertices)
        ctx.fillStyle = '#0f172a';
        ctx.font = 'bold 20px Inter'; // Bigger Font
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        
        const labelOffset = 30; // Bigger offset
        
        const drawLbl = (p, text) => {
            const dx = p.x - center.x;
            const dy = p.y - center.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if(dist === 0) return;
            const nx = dx/dist;
            const ny = dy/dist;
            ctx.fillText(text, p.x + nx*labelOffset, p.y + ny*labelOffset);
        };

        if(labels && labels.length === 3) {
            drawLbl(p1, labels[0]);
            drawLbl(p2, labels[1]);
            drawLbl(p3, labels[2]);
        }

        // Draw Marks
        const drawSideTick = (a, b, count, color='#ef4444') => {
            const midX = (a.x + b.x)/2;
            const midY = (a.y + b.y)/2;
            const dx = b.x - a.x;
            const dy = b.y - a.y;
            const len = Math.sqrt(dx*dx + dy*dy);
            const nx = -dy/len * 10; 
            const ny = dx/len * 10;
            
            for(let i=0; i<count; i++) {
                const off = (i - (count-1)/2) * 8;
                ctx.beginPath();
                ctx.moveTo(midX + nx + dx/len*off, midY + ny + dy/len*off);
                ctx.lineTo(midX - nx + dx/len*off, midY - ny + dy/len*off);
                ctx.strokeStyle = color;
                ctx.lineWidth = 3;
                ctx.stroke();
            }
        };

        const drawAngleArc = (p, prev, next, count, color='#3b82f6') => {
            const startAng = Math.atan2(prev.y - p.y, prev.x - p.x);
            const endAng = Math.atan2(next.y - p.y, next.x - p.x);
            
            let cwDiff = endAng - startAng;
            while(cwDiff < 0) cwDiff += 2*Math.PI;
            let useCCW = (cwDiff > Math.PI);
            
            for(let i=1; i<=count; i++) {
                ctx.beginPath();
                ctx.arc(p.x, p.y, 22 + i*7, startAng, endAng, useCCW); // Slightly larger radius
                ctx.strokeStyle = color;
                ctx.lineWidth = 3;
                ctx.stroke();
            }
        };

        const drawValueLabel = (index, type, label, color) => {
            ctx.fillStyle = color || '#2563eb';
            ctx.font = "bold 20px sans-serif"; // Bigger font
            
            if (type === 'side') {
                const pts = [p1, p2, p3];
                const a = pts[index];
                const b = pts[(index+1)%3];
                const midX = (a.x + b.x)/2;
                const midY = (a.y + b.y)/2;
                
                const vx = midX - center.x;
                const vy = midY - center.y;
                const vLen = Math.sqrt(vx*vx + vy*vy);
                
                const off = 30;
                ctx.fillText(label, midX + (vx/vLen)*off, midY + (vy/vLen)*off);
            } else {
                const pts = [p1, p2, p3];
                const p = pts[index];
                const prev = pts[(index + 2) % 3];
                const next = pts[(index + 1) % 3];

                const startAng = Math.atan2(prev.y - p.y, prev.x - p.x);
                const endAng = Math.atan2(next.y - p.y, next.x - p.x);
                
                let cwDiff = endAng - startAng;
                while(cwDiff < 0) cwDiff += 2*Math.PI;
                let useCCW = (cwDiff > Math.PI);

                let midAng;
                if (useCCW) {
                     let d = startAng - endAng;
                     while (d < 0) d += 2*Math.PI;
                     midAng = startAng - d/2;
                } else {
                     let d = endAng - startAng;
                     while (d < 0) d += 2*Math.PI;
                     midAng = startAng + d/2;
                }
                
                const dist = 55; // Further out
                ctx.fillText(label, p.x + dist*Math.cos(midAng), p.y + dist*Math.sin(midAng));
            }
        };

        marks.forEach(m => {
            if (m.type === 'side') {
                const pairs = [[p1,p2], [p2,p3], [p3,p1]];
                drawSideTick(pairs[m.index][0], pairs[m.index][1], m.count, m.color || '#ef4444');
            } else if (m.type === 'angle') {
                const pts = [p1, p2, p3];
                const prevs = [p3, p1, p2];
                const nexts = [p2, p3, p1];
                drawAngleArc(pts[m.index], prevs[m.index], nexts[m.index], m.count, m.color || '#3b82f6');
            } else if (m.type === 'value_side') {
                drawValueLabel(m.index, 'side', m.text, m.color);
            } else if (m.type === 'value_angle') {
                drawValueLabel(m.index, 'angle', m.text, m.color);
            }
        });
    }

    function clearCanvas() {
        els.ctx.clearRect(0, 0, els.canvas.width, els.canvas.height);
        // Grid background
        els.ctx.save();
        els.ctx.strokeStyle = '#f1f5f9';
        els.ctx.lineWidth = 1;
        for(let i=0; i<els.canvas.width; i+=25) { els.ctx.beginPath(); els.ctx.moveTo(i,0); els.ctx.lineTo(i,els.canvas.height); els.ctx.stroke(); }
        for(let i=0; i<els.canvas.height; i+=25) { els.ctx.beginPath(); els.ctx.moveTo(0,i); els.ctx.lineTo(els.canvas.width,i); els.ctx.stroke(); }
        els.ctx.restore();
    }

    // --- TOPIC GENERATORS ---

    function genNaming() {
        const offset1 = {x: 180, y: 220};
        const offset2 = {x: 520, y: 220};
        const r = 135; // Bigger
        
        const basePts = getTrianglePoints(r); 
        
        const rot1 = randInt(0, 360) * Math.PI/180;
        const tri1 = basePts.map(p => rotatePoint(p, rot1)).map(p => ({x: p.x + offset1.x, y: p.y + offset1.y}));
        
        const rot2 = randInt(0, 360) * Math.PI/180;
        const tri2 = basePts.map(p => rotatePoint(p, rot2)).map(p => ({x: p.x + offset2.x, y: p.y + offset2.y}));
        
        const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        let start = randInt(0, 20);
        const l1 = [alphabet[start], alphabet[start+1], alphabet[start+2]];
        const l2 = [alphabet[start+3], alphabet[start+4], alphabet[start+5]];
        
        const marks = [
            {type: 'side', index: 0, count: 1}, 
            {type: 'angle', index: 1, count: 1},
            {type: 'side', index: 1, count: 2}
        ];
        
        return {
            type: 'naming',
            draw: (ctx) => {
                drawTriangle(ctx, tri1[0], tri1[1], tri1[2], l1, marks);
                drawTriangle(ctx, tri2[0], tri2[1], tri2[2], l2, marks);
            },
            l1_chars: l1,
            l2_chars: l2
        };
    }

    function genFinding() {
        const r = 135; // Bigger
        const basePts = getTrianglePoints(r); 
        
        const center1 = {x: 180, y: 220};
        const center2 = {x: 520, y: 220};

        const rot1 = randInt(0, 360) * Math.PI/180;
        const tri1 = basePts.map(p => rotatePoint(p, rot1)).map(p => ({x: p.x + center1.x, y: p.y + center1.y}));
        
        const rot2 = randInt(0, 360) * Math.PI/180;
        const tri2 = basePts.map(p => rotatePoint(p, rot2)).map(p => ({x: p.x + center2.x, y: p.y + center2.y}));

        const propertyType = Math.random() > 0.5 ? 'side' : 'angle';
        const val = randInt(30, 70); 
        const distractorVal = val + randInt(10, 30);
        
        let marks1 = [];
        let marks2 = [];
        
        const values = [val, distractorVal, 180-val-distractorVal]; 
        
        // Populate ALL 3 values on Tri 1 (Blue)
        for(let i=0; i<3; i++) {
             if (propertyType === 'side') {
                 // Side values
                 marks1.push({type: 'value_side', index: i, text: randInt(10,30), color: '#2563eb'});
             } else {
                 // Angle values + Curves
                 marks1.push({type: 'value_angle', index: i, text: values[i] + '°', color: '#2563eb'});
                 marks1.push({type: 'angle', index: i, count: 1, color: '#2563eb'}); 
             }
        }
        
        // Override one correct value on Tri 1
        const correctIndex = 0; 
        if (propertyType === 'side') {
             marks1[correctIndex].text = val; 
             marks2.push({type: 'value_side', index: correctIndex, text: 'x', color: '#dc2626'});
        } else {
             marks1[correctIndex*2].text = val + '°'; 
             marks2.push({type: 'value_angle', index: correctIndex, text: 'x', color: '#dc2626'});
             marks2.push({type: 'angle', index: correctIndex, count: 1, color: '#dc2626'}); 
        }
        
        return {
            type: 'finding',
            draw: (ctx) => {
                drawTriangle(ctx, tri1[0], tri1[1], tri1[2], ['A','B','C'], marks1);
                drawTriangle(ctx, tri2[0], tri2[1], tri2[2], ['D','E','F'], marks2);
            },
            val: val,
            distractors: [distractorVal, values[2]], 
            reason: propertyType === 'side' ? "corr. sides, ≅△s" : "corr. ∠s, ≅△s",
            labels1: ['A','B','C'],
            labels2: ['D','E','F']
        };
    }

    function genProving() {
        const type = randInt(0, 2); 
        
        // --- SCENARIO 1: Separated Triangles ---
        if (type === 0) {
            const offset1 = {x: 180, y: 220};
            const offset2 = {x: 520, y: 220};
            const r = 110;
            const pts = getTrianglePoints(r); 
            const rot1 = randInt(0, 360)*Math.PI/180;
            const rot2 = randInt(0, 360)*Math.PI/180;
            const tri1 = pts.map(p => rotatePoint(p, rot1)).map(p => ({x: p.x + offset1.x, y: p.y + offset1.y}));
            const tri2 = pts.map(p => rotatePoint(p, rot2)).map(p => ({x: p.x + offset2.x, y: p.y + offset2.y}));
            
            // Marks: SSS
            const marks = [
                {type: 'side', index: 0, count: 1}, 
                {type: 'side', index: 1, count: 2}, 
                {type: 'side', index: 2, count: 3}
            ];
            
            return {
                type: 'proving',
                goal: '△ABC ≅ △DEF',
                draw: (ctx) => {
                    drawTriangle(ctx, tri1[0], tri1[1], tri1[2], ['A','B','C'], marks);
                    drawTriangle(ctx, tri2[0], tri2[1], tri2[2], ['D','E','F'], marks);
                },
                correctSequence: [
                    {stmt: "AB=DE", reason: "Given"},
                    {stmt: "BC=EF", reason: "Given"}, 
                    {stmt: "AC=DF", reason: "Given"},
                    {stmt: "Conclusion", reason: "SSS"}
                ]
            };
        }
        
        // --- SCENARIO 2: Bow-tie ---
        else if (type === 1) {
            const cx = 350, cy = 190;
            const dx = 100, dy = 70;
            const rawPts = [{x:-dx,y:-dy}, {x:dx,y:-dy}, {x:-dx,y:dy}, {x:dx,y:dy}];
            const rawO = {x: 0, y: 0};
            const rot = randInt(0, 360) * Math.PI/180;
            const rPts = rawPts.map(p => rotatePoint(p, rot));
            const rO = rotatePoint(rawO, rot);
            
            const pA = {x: rPts[0].x+cx, y: rPts[0].y+cy};
            const pB = {x: rPts[1].x+cx, y: rPts[1].y+cy}; 
            const pC = {x: rPts[2].x+cx, y: rPts[2].y+cy};
            const pD = {x: rPts[3].x+cx, y: rPts[3].y+cy};
            const pO = {x: rO.x+cx, y: rO.y+cy};
            
            return {
                type: 'proving',
                goal: '△AOB ≅ △DOC',
                draw: (ctx) => {
                    ctx.beginPath();
                    ctx.moveTo(pA.x, pA.y); ctx.lineTo(pD.x, pD.y);
                    ctx.moveTo(pB.x, pB.y); ctx.lineTo(pC.x, pC.y);
                    ctx.moveTo(pA.x, pA.y); ctx.lineTo(pB.x, pB.y);
                    ctx.moveTo(pC.x, pC.y); ctx.lineTo(pD.x, pD.y);
                    ctx.lineWidth = 3; ctx.strokeStyle = '#334155'; ctx.stroke();
                    
                    ctx.fillStyle = '#0f172a'; ctx.font = 'bold 18px Inter';
                    const dt = (t,x,y) => ctx.fillText(t,x,y);
                    dt("A", pA.x, pA.y-10); dt("B", pB.x, pB.y-10); 
                    dt("C", pC.x, pC.y+15); dt("D", pD.x, pD.y+15);
                    dt("O", cx, cy-20);
                    
                    // Mark Sides AO=DO, BO=CO
                    const mid = (p1,p2) => ({x:(p1.x+p2.x)/2, y:(p1.y+p2.y)/2});
                    const drawTick = (p1,p2,c) => {
                        const m = mid(p1,p2);
                        const dx = p2.x - p1.x, dy = p2.y - p1.y;
                        const len = Math.sqrt(dx*dx+dy*dy);
                        const nx = -dy/len * 7, ny = dx/len * 7;
                        ctx.beginPath();
                        for(let i=0; i<c; i++){
                            const off = (i-(c-1)/2)*6;
                            ctx.moveTo(m.x+nx+dx/len*off, m.y+ny+dy/len*off);
                            ctx.lineTo(m.x-nx+dx/len*off, m.y-ny+dy/len*off);
                        }
                        ctx.strokeStyle='#ef4444'; ctx.stroke();
                    }
                    drawTick(pA, pO, 1); drawTick(pD, pO, 1); 
                    drawTick(pB, pO, 2); drawTick(pC, pO, 2);
                    
                    // Mark Vertical Angles
                    function drawArc(ctx, center, start, end, radius=20) {
                        let diff = end - start;
                        while(diff <= -Math.PI) diff += 2*Math.PI;
                        while(diff > Math.PI) diff -= 2*Math.PI;
                        let ccw = false;
                        let cwDiff = end - start;
                        while(cwDiff < 0) cwDiff += 2*Math.PI;
                        if(cwDiff > Math.PI) ccw = true;
                        ctx.beginPath(); ctx.arc(center.x, center.y, radius, start, end, ccw);
                        ctx.strokeStyle = '#3b82f6'; ctx.lineWidth = 2.5; ctx.stroke();
                    }

                    const angAOB = Math.atan2(pB.y-pO.y, pB.x-pO.x);
                    const angAOA = Math.atan2(pA.y-pO.y, pA.x-pO.x);
                    drawArc(ctx, pO, Math.min(angAOB,angAOA), Math.max(angAOB,angAOA), 20);
                    const angDOC = Math.atan2(pC.y-pO.y, pC.x-pO.x);
                    const angDOD = Math.atan2(pD.y-pO.y, pD.x-pO.x);
                    drawArc(ctx, pO, Math.min(angDOC,angDOD), Math.max(angDOC,angDOD), 20);
                },
                correctSequence: [
                    {stmt: "AO=DO", reason: "Given"},
                    {stmt: "BO=CO", reason: "Given"}, 
                    {stmt: "∠AOB=∠DOC", reason: "Vert. Opp. ∠s"},
                    {stmt: "Conclusion", reason: "SAS"}
                ]
            };
        }
        
        // --- SCENARIO 3: Shared Side ---
        else {
            const cx = 350, cy = 190;
            const pA = {x: 250, y: 150};
            const pC = {x: 450, y: 150};
            const pB = {x: 350, y: 50};
            const pD = {x: 350, y: 290};
            const rot = randInt(0, 180)*Math.PI/180;
            const pts = [pA, pB, pC, pD].map(p => rotatePoint(p, rot, {x:cx,y:cy}));
            
            return {
                type: 'proving',
                goal: '△ABD ≅ △CBD',
                draw: (ctx) => {
                    ctx.beginPath();
                    ctx.moveTo(pts[0].x, pts[0].y); ctx.lineTo(pts[1].x, pts[1].y); // A-B
                    ctx.lineTo(pts[2].x, pts[2].y); // B-C
                    ctx.lineTo(pts[3].x, pts[3].y); // C-D
                    ctx.lineTo(pts[0].x, pts[0].y); // D-A
                    ctx.moveTo(pts[1].x, pts[1].y); ctx.lineTo(pts[3].x, pts[3].y); // B-D
                    ctx.lineWidth = 3; ctx.strokeStyle = '#334155'; ctx.stroke();
                    
                    const dt = (t,p) => ctx.fillText(t, p.x + (p.x-cx)*0.15, p.y + (p.y-cy)*0.15);
                    dt("A", pts[0]); dt("B", pts[1]); dt("C", pts[2]); dt("D", pts[3]);
                    
                    // Helper tick draw
                    const drawTick = (p1,p2,c) => {
                       const mx = (p1.x+p2.x)/2, my = (p1.y+p2.y)/2;
                       const dx=p2.x-p1.x, dy=p2.y-p1.y;
                       const len=Math.sqrt(dx*dx+dy*dy);
                       const nx=-dy/len*7, ny=dx/len*7;
                       ctx.beginPath();
                       for(let i=0; i<c; i++){
                           const off=(i-(c-1)/2)*6;
                           ctx.moveTo(mx+nx+dx/len*off, my+ny+dy/len*off);
                           ctx.lineTo(mx-nx+dx/len*off, my-ny+dy/len*off);
                       }
                       ctx.strokeStyle='#ef4444'; ctx.stroke();
                    };
                    
                    drawTick(pts[0], pts[1], 1); // AB
                    drawTick(pts[2], pts[1], 1); // CB
                    drawTick(pts[0], pts[3], 2); // AD
                    drawTick(pts[2], pts[3], 2); // CD
                },
                correctSequence: [
                    {stmt: "AB=CB", reason: "Given"},
                    {stmt: "AD=CD", reason: "Given"},
                    {stmt: "BD=BD", reason: "Common Side"},
                    {stmt: "Conclusion", reason: "SSS"}
                ]
            };
        }
    }

    // --- UI CONTROLLER ---

    function renderQuestion() {
        const q = state.currentQ;
        clearCanvas();
        q.draw(els.ctx);
        
        els.interaction.innerHTML = ''; 

        if (q.type === 'naming') {
            const container = document.createElement('div');
            container.className = 'flex flex-col gap-4 animate-fade-in';
            container.innerHTML = `
                <div class="bg-indigo-50 p-4 rounded-2xl border border-indigo-100">
                    <h3 class="font-bold text-indigo-900 text-sm uppercase tracking-wide mb-2">Write the full statement</h3>
                    <p class="text-xs text-indigo-600 mb-3">Include triangle symbols. Order matters!</p>
                    <input id="namingInput" class="w-full p-4 text-xl font-bold text-center border-2 border-indigo-200 rounded-xl focus:border-indigo-500 outline-none bg-white shadow-inner font-mono tracking-widest" placeholder="△___ ≅ △___">
                </div>
                
                <div class="grid grid-cols-4 gap-2">
                    <button class="symbol-btn" onclick="app.insertSymbol('△')">△</button>
                    <button class="symbol-btn" onclick="app.insertSymbol('≅')">≅</button>
                    <button class="symbol-btn" onclick="app.insertSymbol('=')">=</button>
                    <button class="symbol-btn" onclick="app.insertSymbol('∠')">∠</button>
                </div>
                
                <button onclick="app.checkNaming()" class="mt-2 py-4 bg-slate-900 text-white font-bold rounded-xl shadow-lg hover:bg-black transition transform active:scale-95">Check Answer</button>
            `;
            els.interaction.appendChild(container);
        } else if (q.type === 'finding') {
            const container = document.createElement('div');
            container.className = 'flex flex-col gap-4 animate-fade-in';
            
            const statement = `<h3 class="text-center font-bold text-indigo-800 text-lg bg-indigo-50 py-2 rounded-lg border border-indigo-100 mb-2">Given: △${q.labels1.join('')} ≅ △${q.labels2.join('')}</h3>`;
            
            const opts = [q.val, q.distractors[0], q.distractors[1], q.val + randInt(30, 40)].sort(()=>Math.random()-0.5);
            const reasons = ["corr. sides, ≅△s", "corr. ∠s, ≅△s", "base ∠s of isos. △", "alt. ∠s, AB//CD"].sort(()=>Math.random()-0.5);
            
            let html = statement + `<div class="grid grid-cols-2 gap-3"><div class="bg-slate-50 p-3 rounded-2xl border border-slate-200"><h3 class="font-bold text-xs text-slate-400 uppercase tracking-widest mb-2">1. Value</h3><div class="grid grid-cols-2 gap-2">`;
            opts.forEach(o => html += `<button class="option-btn p-3 rounded-lg font-bold text-lg" onclick="app.selectOpt(this, 'val', ${o})">${o}</button>`);
            html += `</div></div><div class="bg-slate-50 p-3 rounded-2xl border border-slate-200"><h3 class="font-bold text-xs text-slate-400 uppercase tracking-widest mb-2">2. Reason</h3><div class="grid grid-cols-1 gap-2">`;
            reasons.forEach(r => html += `<button class="option-btn p-3 rounded-lg text-xs font-bold text-left" onclick="app.selectOpt(this, 'reason', '${r}')">${r}</button>`);
            html += `</div></div></div><button onclick="app.checkFinding(${q.val}, '${q.reason}')" class="mt-2 py-4 bg-indigo-600 text-white font-bold rounded-xl shadow-lg hover:bg-indigo-700 transition transform active:scale-95">Check Answer</button>`;
            
            container.innerHTML = html;
            els.interaction.appendChild(container);
        } else if (q.type === 'proving') {
            const container = document.createElement('div');
            container.className = 'flex flex-col gap-3 text-sm animate-fade-in';
            
            const toolbar = `
                <div class="flex gap-3 justify-center mb-3">
                    <button class="symbol-btn text-xl py-2 px-4" onclick="app.insertProofSymbol('∠')">∠</button>
                    <button class="symbol-btn text-xl py-2 px-4" onclick="app.insertProofSymbol('△')">△</button>
                    <button class="symbol-btn text-xl py-2 px-4" onclick="app.insertProofSymbol('=')">=</button>
                    <button class="symbol-btn text-xl py-2 px-4" onclick="app.insertProofSymbol('≅')">≅</button>
                </div>`;

            const row = (i) => `
                <div class="flex gap-2 items-center bg-slate-50 p-2 rounded-xl border border-slate-200">
                    <span class="font-bold text-slate-300 w-4">${i}.</span>
                    <input id="stmt${i}" onfocus="app.setFocus('stmt${i}')" placeholder="Statement" class="flex-1 bg-white border border-slate-200 rounded-lg p-2 uppercase font-mono text-xs focus:ring-2 ring-indigo-100 outline-none">
                    <select id="rsn${i}" class="flex-1 bg-white border border-slate-200 rounded-lg p-2 text-xs font-bold text-slate-600 outline-none">
                        <option value="">Reason...</option>
                        <option>Given</option>
                        <option>Common Side</option>
                        <option>Vert. Opp. ∠s</option>
                        <option>Alt. Angles</option>
                        <option>Radii of circle</option>
                    </select>
                </div>`;
            
            let html = `<h3 class="font-bold text-slate-800 text-lg mb-2 ml-1">Prove: <span class="text-indigo-600">${q.goal}</span></h3>` + toolbar;
            html += row(1) + row(2) + row(3);
            html += `
                <div class="mt-2 pt-2">
                    <label class="font-bold text-xs text-slate-400 uppercase tracking-widest ml-1">Conclusion (Reason):</label>
                    <div class="grid grid-cols-3 gap-2 mt-2">
                        ${['SSS','SAS','ASA','AAS','RHS','AAA'].map(r => 
                            `<button class="option-btn p-2 rounded-lg font-bold text-xs" onclick="app.selectConclusion(this, '${r}')">${r}</button>`
                        ).join('')}
                    </div>
                </div>
                <button onclick="app.checkProof()" class="mt-4 py-3 bg-slate-900 text-white font-bold rounded-xl shadow-lg hover:bg-slate-800 transition">Submit Proof</button>
            `;
            container.innerHTML = html;
            els.interaction.appendChild(container);
        }
    }

    // --- INTERACTION HANDLERS ---

    function startTopic(type) {
        state.topic = type;
        state.score = 0;
        state.qCount = 0;
        
        els.menu.classList.add('hidden');
        els.quiz.classList.remove('hidden');
        els.topicTitle.textContent = type.toUpperCase();
        
        nextQuestion();
    }

    function nextQuestion() {
        els.feedback.classList.add('hidden'); 

        if (state.qCount >= state.totalQ) {
            // Transition to result screen
            els.quiz.classList.add('hidden');
            document.getElementById('screen-results').classList.remove('hidden');
            
            document.getElementById('resTopic').textContent = state.topic.toUpperCase();
            document.getElementById('resScore').textContent = state.score;
            document.getElementById('resTotal').textContent = state.totalQ;
            return;
        }
        
        if (state.topic === 'naming') state.currentQ = genNaming();
        else if (state.topic === 'finding') state.currentQ = genFinding();
        else state.currentQ = genProving();
        
        renderQuestion();
        state.qCount++;
        els.score.textContent = `${state.score}/${state.qCount-1}`;
    }
    
    function finishExit() {
        location.reload();
    }

    // Naming Logic
    function insertSymbol(sym) {
        const inp = document.getElementById('namingInput');
        inp.value += sym;
        inp.focus();
    }
    
    function checkNaming() {
        const input = document.getElementById('namingInput').value.replace(/\s+/g, '').toUpperCase(); 
        const match = input.match(/[△]?([A-Z]{3})[≅=][△]?([A-Z]{3})/);
        
        if (!match) {
            showFeedback(false, "Format error! Use: △ABC ≅ △DEF");
            return;
        }

        const t1 = match[1];
        const t2 = match[2];
        const q = state.currentQ;

        const checkMap = (str1, str2) => {
            if (str1.length !== 3 || str2.length !== 3) return false;
            for(let i=0; i<3; i++) {
                const char1 = str1[i];
                const char2 = str2[i];
                
                const idx1 = q.l1_chars.indexOf(char1);
                if (idx1 === -1) return false; 
                
                const expectedChar2 = q.l2_chars[idx1];
                if (char2 !== expectedChar2) return false;
            }
            return true;
        };

        if (checkMap(t1, t2)) {
            showFeedback(true, `Correct! ${t1} corresponds to ${t2}.`);
            // Increment global progress tracker (if available)
            if (window && typeof window.__mq_increment === 'function') {
                window.__mq_increment('congruence', 1);
            } else {
                try { const key = 'mq_score_congruence'; const curr = parseInt(localStorage.getItem(key) || '0',10); localStorage.setItem(key, String(curr+1)); } catch(e){}
            }
        } else {
            showFeedback(false, `Incorrect correspondence. Watch the vertex order!`);
        }
    }

    // Finding Logic
    let selectedFinding = {val:null, reason:null};
    function selectOpt(btn, type, val) {
        btn.parentElement.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedFinding[type] = val;
    }
    function checkFinding(corrVal, corrReason) {
        if (selectedFinding.val == corrVal && selectedFinding.reason === corrReason) {
            showFeedback(true, "Spot on!");
            if (window && typeof window.__mq_increment === 'function') {
                window.__mq_increment('congruence', 1);
            } else { try { const key = 'mq_score_congruence'; const curr = parseInt(localStorage.getItem(key) || '0',10); localStorage.setItem(key, String(curr+1)); } catch(e){} }
        } else {
            showFeedback(false, `Answer: ${corrVal}, Reason: ${corrReason}`);
        }
    }

    // Proving Logic
    let selectedConcl = null;
    function selectConclusion(btn, val) {
        document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedConcl = val;
    }
    function checkProof() {
        const s1 = document.getElementById('stmt1').value;
        const s2 = document.getElementById('stmt2').value;
        const s3 = document.getElementById('stmt3').value;
        const r1 = document.getElementById('rsn1').value;
        const r2 = document.getElementById('rsn2').value;
        const r3 = document.getElementById('rsn3').value;
        
        const q = state.currentQ;
        
        let valid = false;
        
        if (s1 && s2 && s3 && r1 && r2 && r3 && selectedConcl) {
            const correctConcl = q.correctSequence.find(s => s.stmt === "Conclusion").reason;
            if (selectedConcl === correctConcl) {
                const expectedReasons = q.correctSequence.slice(0,3).map(s => s.reason).sort();
                const userReasons = [r1, r2, r3].sort();
                if (JSON.stringify(expectedReasons) === JSON.stringify(userReasons)) {
                    valid = true;
                }
            }
        }
        
        if (valid) {
             showFeedback(true, "Excellent proof structure!");
             if (window && typeof window.__mq_increment === 'function') {
                 window.__mq_increment('congruence', 1);
             } else {
                 try { const key = 'mq_score_congruence'; const curr = parseInt(localStorage.getItem(key) || '0',10); localStorage.setItem(key, String(curr+1)); } catch(e){}
             }
        } else {
             showFeedback(false, "Check your reasons and conclusion type.");
        }
    }
    
    // Typing helper for Proof
    function setFocus(id) {
        state.lastFocusedInput = id;
    }
    function insertProofSymbol(sym) {
        if(state.lastFocusedInput) {
            const el = document.getElementById(state.lastFocusedInput);
            el.value += sym;
            el.focus();
        }
    }

    function showFeedback(isCorrect, msg) {
        const modal = els.feedback;
        const title = document.getElementById('feedbackTitle');
        const text = document.getElementById('feedbackText');
        const icon = document.getElementById('feedbackIcon');
        
        modal.classList.remove('hidden');
        if (isCorrect) {
            state.score++;
            title.textContent = "Correct!";
            title.className = "text-3xl font-black mb-2 text-green-600";
            icon.textContent = "🎉";
            text.textContent = msg;
            els.body.classList.add('correct-flash');
            setTimeout(()=>els.body.classList.remove('correct-flash'), 500);
        } else {
            title.textContent = "Incorrect";
            title.className = "text-3xl font-black mb-2 text-red-500";
            icon.textContent = "❌";
            text.textContent = msg;
            els.body.classList.add('error-flash');
            setTimeout(()=>els.body.classList.remove('error-flash'), 500);
        }
        els.score.textContent = `${state.score}/${state.qCount}`;
    }

    // Exit Modal Logic
    function requestExit() {
        els.exitModal.classList.remove('hidden');
    }
    
    function closeExitModal() {
        els.exitModal.classList.add('hidden');
    }
    
    function confirmExit() {
        state.topic = null;
        els.exitModal.classList.add('hidden');
        els.quiz.classList.add('hidden');
        document.getElementById('screen-results').classList.add('hidden');
        els.menu.classList.remove('hidden');
        els.feedback.classList.add('hidden');
    }

    return { startTopic, nextQuestion, insertSymbol, checkNaming, selectOpt, checkFinding, selectConclusion, checkProof, requestExit, closeExitModal, confirmExit, setFocus, insertProofSymbol, finishExit };
})();

// Expose to window
window.app = app;
</script>
</body>
